services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: unifyapi
      POSTGRES_PASSWORD: unifyapi
      POSTGRES_DB: unifyapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unifyapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://unifyapi:unifyapi@db:5432/unifyapi?sslmode=disable
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-me-in-production}
      NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID:-}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET:-}
      X402_PAY_TO: ${X402_PAY_TO:-}
      X402_NETWORK: ${X402_NETWORK:-base-sepolia}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://x402.org/facilitator}
    ports:
      - "3000:3000"

volumes:
  pgdata:
